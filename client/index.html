<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#0a0b0f" />

    <!-- Primary SEO -->
    <title>SteamPulse | Live Steam Game Analytics and Player Statistics</title>
    <meta name="description" content="Real-time Steam game player counts, top charts, trending games, historical analytics, genre explorer, and game comparison tools. The most comprehensive Steam analytics platform." />
    <meta name="keywords" content="steam charts, steam player count, steam statistics, steam analytics, top steam games, steam concurrent players, steam trending games" />
    <meta name="author" content="SteamPulse" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SteamPulse" />
    <meta property="og:title" content="SteamPulse | Live Steam Game Analytics" />
    <meta property="og:description" content="Real-time Steam player counts, top charts, trending games, and deep analytics for every game on Steam." />
    <meta property="og:image" content="https://cdn.cloudflare.steamstatic.com/store/home/store_home_share.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SteamPulse | Live Steam Game Analytics" />
    <meta name="twitter:description" content="Real-time Steam player counts, top charts, trending games, and deep analytics." />
    <meta name="twitter:image" content="https://cdn.cloudflare.steamstatic.com/store/home/store_home_share.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: Rajdhani (display) + Inter (body) + JetBrains Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SteamPulse",
      "url": "https://steampulse.gg",
      "description": "Real-time Steam game analytics and player statistics",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://steampulse.gg/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
