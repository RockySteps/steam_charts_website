# =============================================================================
# SteamPulse — Nginx Configuration
# Place at: /etc/nginx/sites-available/steampulse
# Symlink:  ln -s /etc/nginx/sites-available/steampulse /etc/nginx/sites-enabled/steampulse
#
# This config assumes:
#   - Cloudflare is in front (proxied) — real IPs restored via CF-Connecting-IP
#   - SSL is terminated at Cloudflare (set CF SSL mode to "Full (strict)")
#   - Certbot will add SSL block below when you run certbot --nginx
# =============================================================================

# Rate limiting zones (protects API from abuse)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

# Upstream Node.js app
upstream steampulse_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # Replace _ with your domain: e.g. steampulse.com www.steampulse.com

    # -------------------------------------------------------------------------
    # Cloudflare Real IP Restoration
    # (Cloudflare IP ranges — update periodically from https://www.cloudflare.com/ips/)
    # -------------------------------------------------------------------------
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # -------------------------------------------------------------------------
    # Static assets — long cache (Vite adds content hash to filenames)
    # -------------------------------------------------------------------------
    location /assets/ {
        proxy_pass http://steampulse_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static files (favicon, robots.txt, sitemap.xml)
    location ~* \.(ico|svg|txt|xml|webmanifest)$ {
        proxy_pass http://steampulse_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # API — rate limited, no caching
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://steampulse_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-store, no-cache";
    }

    # -------------------------------------------------------------------------
    # All other requests → Node.js app (SPA fallback)
    # -------------------------------------------------------------------------
    location / {
        limit_req zone=general burst=200 nodelay;
        proxy_pass http://steampulse_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # -------------------------------------------------------------------------
    # Block common attack paths
    # -------------------------------------------------------------------------
    location ~* \.(php|asp|aspx|jsp)$ { return 444; }
    location ~ /\.ht { return 444; }
    location ~ /\.git { return 444; }
}

# Certbot will automatically add an HTTPS server block below this line.
